<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Spot Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="site-page">
    <div class="page-overlay">
        <header class="site-header">
            <div class="site-header-inner">
                <h1 class="site-title">Study Spot Finder</h1>
                <nav class="top-nav">
                    <a href="{{ url_for('homepage') }}">Home</a>
                    <a href="{{ url_for('study_spot_suggestion') }}">Study Spot Suggestion</a>
                    <a href="{{ url_for('logout') }}">Logout</a>
                </nav>
            </div>
        </header>

        <main class="site-main">
            <section class="dashboard-layout">
                <aside class="filter-panel">
                    <h2>Study Spot Filters</h2>
                    <hr>

                    <form id="filter-form">
                        <div class="filter-group">
                            <p>Atmosphere</p>
                            <label><input type="checkbox" name="quiet" value="true"> Quiet Zone</label>
                            <label><input type="checkbox" name="outlets" value="true"> Power Outlets</label>
                            <label><input type="checkbox" name="wifi" value="true"> Fast Wi-Fi</label>
                        </div>

                        <div class="filter-group">
                            <p>Location Area</p>
                            <label><input type="checkbox" name="on-campus" value="true" id="check-on-campus"> On Campus</label>
                            <label><input type="checkbox" name="off-campus" value="true" id="check-off-campus"> Off Campus</label>
                        </div>

                        <div class="filter-group">
                            <p>Location Type</p>
                            <label><input type="checkbox" name="type" value="library"> Libraries</label>
                            <label><input type="checkbox" name="type" value="cafe"> Cafe/Food</label>
                            <div id="on-campus-types">
                                <label><input type="checkbox" name="type" value="uni_hall"> Study Halls</label>
                                <label><input type="checkbox" name="type" value="uni_classroom"> Classrooms</label>
                                <label><input type="checkbox" name="type" value="uni_lounges"> Study Lounges</label>
                            </div>
                        </div>

                        <div class="filter-group">
                            <p>Search Radius</p>
                            <select name="radius">
                                <option value="500">500m</option>
                                <option value="1000">1km</option>
                                <option value="2000">2km</option>
                                <option value="3000">3km</option>
                                <option value="5000">5km</option>
                            </select>
                        </div>

                        <button type="submit" class="primary-btn full-btn">Apply Filters</button>
                    </form>
                </aside>

                <section class="map-section">
                    <div class="map-card">
                        <div class="map-card-header">
                            <h2>Find the Study Spot For You!</h2>
                            <p>Browse the campus area and filter study locations</p>
                        </div>

                        <button id="toggle-ranking" class="primary-btn">
                            View Ranked List
                        </button>

                        <div id="map"></div>
                    </div>

                    <div id="ranking-panel" class="ranking-panel hidden">
                        <div class="ranking-header">
                            <h2>Top Study Spots ⭐</h2>
                            <button id="close-ranking" type="button">✖</button>
                        </div>
                        <div id="ranking-list"></div>
                    </div>
                </section>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        var map = L.map('map', {
            zoomControl: false
        }).setView([51.0782, -114.1305], 15);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let markerLayer = L.layerGroup().addTo(map);

        document.getElementById('filter-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const userLocation = map.getCenter();
            const formData = new FormData(this);

            const params = new URLSearchParams(formData);
            params.append('lat', userLocation.lat);
            params.append('lng', userLocation.lng);

            params.set('on-campus', document.getElementById('check-on-campus').checked);
            params.set('off-campus', document.getElementById('check-off-campus').checked);

            fetch(`/api/search?${params.toString()}`)
                .then(response => response.json())
                .then(data => {
                    renderMarkers(data);
                    renderRankingList(data);
                })
                .catch(err => console.error("Search error:", err));
        });

        const checkOnCampus = document.getElementById('check-on-campus');
        const checkOffCampus = document.getElementById('check-off-campus');
        const onCampusTypes = document.getElementById('on-campus-types');
        const offCampusTypes = document.getElementById('off-campus-types');

        function toggleTypeVisibility() {
            if (onCampusTypes) onCampusTypes.style.display = checkOnCampus.checked ? 'block' : 'none';
            if (offCampusTypes) offCampusTypes.style.display = checkOffCampus.checked ? 'block' : 'none';
        }

        checkOnCampus.addEventListener('change', toggleTypeVisibility);
        checkOffCampus.addEventListener('change', toggleTypeVisibility);
        toggleTypeVisibility();

        function onLocationFound(e) {
            var radius = e.accuracy / 2;
            L.marker(e.latlng).addTo(map).bindPopup("You are here").openPopup();
            L.circle(e.latlng, radius).addTo(map);
            map.setView(e.latlng, 16);
        }

        function onLocationError(e) {
            console.log("Location not found: " + e.message);
        }

        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);
        map.locate({setView: true, maxZoom: 16});

        function renderMarkers(data) {
            markerLayer.clearLayers();

            if (data.length === 0) {
                alert("No spots found with these filters.");
                return;
            }

            data.forEach(spot => {
                const safeName = spot.name.replace(/[^a-z0-9]/gi, '-');
                const summaryId = `summary-${safeName}`;
                const escapedName = spot.name.replace(/'/g, "\\'");

                let popupContent = `
                    <div style="min-width: 200px;">
                        <h3 style="margin:0 0 5px 0;">${spot.name}</h3>
                        <span style="background:#eee; padding:2px 5px; border-radius:3px; font-size:0.8em;">${spot.type}</span>
                    </div>
                `;

                const marker = L.marker([spot.lat, spot.lon]).bindPopup(popupContent, {
                    maxWidth: 300,
                    autoPan: true,
                    keepInView: true
                });

                markerLayer.addLayer(marker);
            });

            const bounds = L.latLngBounds(data.map(d => [d.lat, d.lon]));
            map.fitBounds(bounds, { padding: [50, 50] });
        }

        function fetchSummary(locationName, containerId) {
            if (window.event) window.event.stopPropagation();

            const activePopup = document.querySelector('.leaflet-popup-content');
            const container = activePopup ? activePopup.querySelector(`#${containerId}`) : document.getElementById(containerId);

            if (!container) return;

            container.innerHTML = `<span style="font-size:0.8em; color:#666;">🤖 AI is analyzing reviews...</span>`;

            if (map._popup) map._popup.update();

            fetch(`/api/summarize/${encodeURIComponent(locationName)}`)
                .then(response => response.json())
                .then(data => {
                    container.innerHTML = `
                        <div style="background: #f8f9fa; border-left: 3px solid #007bff; padding: 8px; font-size: 0.85em; margin-top: 5px; color: #333;">
                            <strong>AI Verdict:</strong> ${data.summary}
                        </div>
                    `;
                    if (map._popup) map._popup.update();
                })
                .catch(err => {
                    container.innerHTML = `<span style="color:red; font-size:0.8em;">Summary unavailable.</span>`;
                    console.error(err);
                });
        }

        const panel = document.getElementById('ranking-panel');
        const toggleRankingButton = document.getElementById('toggle-ranking');
        const closeRankingButton = document.getElementById('close-ranking');

        toggleRankingButton.addEventListener('click', () => {
            panel.classList.remove('hidden');
        });

        closeRankingButton.addEventListener('click', () => {
            panel.classList.add('hidden');
        });

        function renderRankingList(data) {
            const container = document.getElementById('ranking-list');
            container.innerHTML = '';

            data.forEach((spot, index) => {
                const div = document.createElement('div');
                div.className = 'ranking-item';

                div.innerHTML = `
                    <div class="rank-number">#${index + 1} — ${spot.name}</div>
                    <div style="font-size: 0.85em; color: #555;">${spot.type}</div>
                    ${spot.tip ? `<div style="font-size:0.8em; margin-top:5px;">"${spot.tip}"</div>` : ''}
                `;

                div.onclick = () => {
                    map.setView([spot.lat, spot.lon], 17);
                };

                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
