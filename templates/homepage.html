<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Spot Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="site-page">
    <div class="page-overlay">
        <header class="site-header">
            <div class="site-header-inner">
                <h1 class="site-title">Study Spot Finder</h1>
                <nav class="top-nav">
                    <a href="{{ url_for('homepage') }}">Home</a>
                    <a href="{{ url_for('study_spot_suggestion') }}">Study Spot Suggestion</a>
                    <a href="{{ url_for('logout') }}">Logout</a>
                </nav>
            </div>
        </header>

        <main class="site-main">
            <section class="dashboard-layout">
                <aside class="filter-panel">
                    <h2>Study Spot Filters</h2>
                    <hr>

                    <div class="filter-group">
                        <div style="margin-top: 15px; text-align: right;">
                            <a href="#" id="clear-filters" style="font-size: 0.8em; color: #888; text-decoration: none; cursor: pointer;">
                                Clear all filters
                            </a>
                        </div>
                    </div>

                    <form id="filter-form">
                        <div class="filter-group">
                            <p>Ammenities</p>
                            <label><input type="checkbox" name="quiet" value="true"> Quiet Zone</label>
                            <label><input type="checkbox" name="outlets" value="true"> Power Outlets</label>
                            <label><input type="checkbox" name="wifi" value="true"> Fast Wi-Fi</label>
                            <label><input type="checkbox" name="transit" value="true"> Transit Stops</label>
                        </div>

                        <div class="filter-group">
                            <p>Location Area</p>
                            <label><input type="checkbox" name="on-campus" value="true" id="check-on-campus"> On Campus</label>
                            <label><input type="checkbox" name="off-campus" value="true" id="check-off-campus"> Off Campus</label>
                        </div>

                        <div class="filter-group">
                            <p>Location Type</p>
                            <label><input type="checkbox" name="type" value="library"> Libraries</label>
                            <label><input type="checkbox" name="type" value="cafe"> Cafe/Food</label>
                            <div id="on-campus-types">
                                <label><input type="checkbox" name="type" value="uni_hall"> Study Halls</label>
                                <label><input type="checkbox" name="type" value="uni_classroom"> Classrooms</label>
                                <label><input type="checkbox" name="type" value="uni_lounges"> Study Lounges</label>
                            </div>
                        </div>

                        <div class="filter-group">
                            <p>Search Radius</p>
                            <select name="radius">
                                <option value="500">500m</option>
                                <option value="1000">1km</option>
                                <option value="2000">2km</option>
                                <option value="3000">3km</option>
                                <option value="5000">5km</option>
                            </select>
                        </div>

                        <button type="submit" class="primary-btn full-btn">Apply Filters</button>
                    </form>
                </aside>

                <section class="map-section">
                    <div class="map-card">
                        <div class="map-card-header">
                            <h2>Find the Study Spot For You!</h2>
                            <p>Browse the campus area and filter study locations</p>
                        </div>

                        <div id="map"></div>
                    </div>
                    </div>
                </section>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Define a specific icon for Transit Stops (place this near your map init)
        const transitIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', // Red marker for transit
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var map = L.map('map', {
            zoomControl: false
        }).setView([51.0782, -114.1305], 15);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let markerLayer = L.layerGroup().addTo(map);

        document.getElementById('filter-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const userLocation = map.getCenter();
            const formData = new FormData(this);

            const params = new URLSearchParams(formData);
            params.append('lat', userLocation.lat);
            params.append('lng', userLocation.lng);

            // Ensure these IDs match your actual HTML checkboxes
            params.set('on-campus', document.getElementById('check-on-campus').checked);
            params.set('off-campus', document.getElementById('check-off-campus').checked);

            fetch(`/api/search?${params.toString()}`)
                .then(response => response.json())
                .then(data => {
                    // 'data' is now { study_spots: [], transit_stops: [] }
                    renderMarkers(data);
                })
                .catch(err => console.error("Search error:", err));
        });

        const checkOnCampus = document.getElementById('check-on-campus');
        const checkOffCampus = document.getElementById('check-off-campus');
        const onCampusTypes = document.getElementById('on-campus-types');
        const offCampusTypes = document.getElementById('off-campus-types');

        function toggleTypeVisibility() {
            if (onCampusTypes) onCampusTypes.style.display = checkOnCampus.checked ? 'block' : 'none';
            if (offCampusTypes) offCampusTypes.style.display = checkOffCampus.checked ? 'block' : 'none';
        }

        checkOnCampus.addEventListener('change', toggleTypeVisibility);
        checkOffCampus.addEventListener('change', toggleTypeVisibility);
        toggleTypeVisibility();

        function onLocationFound(e) {
            var radius = e.accuracy / 2;
            L.marker(e.latlng).addTo(map).bindPopup("You are here").openPopup();
            L.circle(e.latlng, radius).addTo(map);
            map.setView(e.latlng, 16);
        }

        function onLocationError(e) {
            console.log("Location not found: " + e.message);
        }

        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);
        map.locate({setView: true, maxZoom: 16});



        // Create a separate layer for transit dots so we can clear them easily
        let transitLayer = L.layerGroup().addTo(map);

        function renderMarkers(data) {
            markerLayer.clearLayers();
            transitLayer.clearLayers(); // Clear dots from previous searches
            
            allTransitStops = data.transit_stops || [];
            const spots = data.study_spots || [];

            if (spots.length === 0) {
                alert("No spots found.");
                return;
            }

            spots.forEach(spot => {
                const marker = L.marker([spot.lat, spot.lon]);
                marker.bindPopup(`<b>${spot.name}</b><br>${spot.type}`);

                // Trigger the dots when the popup opens
                marker.on('popupopen', function() {
                    showNearbyTransit(spot.lat, spot.lon);
                });

                markerLayer.addLayer(marker);
            });

            const bounds = L.latLngBounds(spots.map(s => [s.lat, s.lon]));
            map.fitBounds(bounds, { padding: [50, 50] });
        }

        function showNearbyTransit(spotLat, spotLon) {
            // 1. CLEAR previous transit dots immediately
            transitLayer.clearLayers();

            const spotLatLng = L.latLng(spotLat, spotLon);
            const searchRadius = 1000; // 1km

            allTransitStops.forEach(stop => {
                const stopLatLng = L.latLng(stop.lat, stop.lon);
                const distance = spotLatLng.distanceTo(stopLatLng); 

                if (distance <= searchRadius) {
                    // 2. Create a small dot instead of a marker
                    L.circleMarker([stop.lat, stop.lon], {
                        radius: 6,           // Size of the dot
                        fillColor: "#ff3300", // Bright orange/red
                        color: "#fff",       // White border
                        weight: 2,           // Border thickness
                        opacity: 1,
                        fillOpacity: 0.8
                    })
                    .bindPopup(`🚌 <b>Transit Stop</b><br>${stop.name}<br>${Math.round(distance)}m away`)
                    .addTo(transitLayer); // Add to the transit-specific layer
                }
            });
        }


        document.getElementById('clear-filters').addEventListener('click', function(e) {
            e.preventDefault();

            // 1. Reset the form (unchecks all checkboxes)
            document.getElementById('filter-form').reset();

            // 2. Hide the type sections (since you have the toggleTypeVisibility function)
            if (typeof toggleTypeVisibility === "function") {
                toggleTypeVisibility();
            }

            // 3. Clear both marker layers from the map
            markerLayer.clearLayers();
            transitLayer.clearLayers();

            // 4. Optional: Reset the map view to the original center
            map.locate({setView: true, maxZoom: 16});
        });

    
    </script>
</body>
</html>
