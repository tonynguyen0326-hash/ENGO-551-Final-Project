{% extends "base.html" %}

{% block content %}
    <h2 style="color: #d881b4;">Reset Password</h2>
    <p>Enter your username and your new desired password.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p style="color: #d881b4; font-weight: bold;">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" style="text-align: left;">
        <label>Username:</label><br>
        <input type="text" name="username" required style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;"><br>
        
        <label>New Password:</label><br>
        <input type="password" name="password" required style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;"><br>
        
        <button type="submit" style="background: #ffb5e5; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;">
            Update Password
        </button>
    </form>

    <div style="margin-top: 15px;">
        <a href="{{ url_for('login') }}" style="color: #777;">Back to Login</a>
    </div>
{% endblock %}
