{% extends "base.html" %}

{% block content %}
    <h2 style="color: #d881b4;">Welcome to Study Spot Finder</h2>
    <p>Please log in to access the campus map and real-time study spot data.</p>
    
    <div style="margin-top: 30px;">
        <a href="{{ url_for('login') }}" style="display: inline-block; background: #ffb5e5; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; margin: 10px;">
            Login
        </a>
        <a href="{{ url_for('register') }}" style="display: inline-block; border: 2px solid #ffb5e5; color: #d881b4; padding: 13px 28px; text-decoration: none; border-radius: 5px; font-weight: bold; margin: 10px;">
            Register
        </a>
    </div>
{% endblock %}
